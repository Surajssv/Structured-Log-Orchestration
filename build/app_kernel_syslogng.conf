
# -----------------------------------------------------------
# 1. Custom Templates (UTC Sub-second ISO-8601 Compliance)
# -----------------------------------------------------------
# C++ Application Formats
template t_app_formatted {
    # Output format: [2026-06-24T08:35:12.431872+00:00] [APP] [PID:12345] [info] message
    template("[\$ISODATE] [APP:\$PROGRAM] [ELAPSED_TICKS:\$SYSUPTIME] [PID:\$PID] [\$LEVEL] \$MSG\n");
};

template t_app_json {
    # Pairs standard ISO timestamp metadata along with properties
    template("\$(format-json --scope rfc5424 --pair TIMESTAMP=\"\$ISODATE\" --pair TYPE=\"APP\" --pair PROGRAM=\"\$PROGRAM\" --pair LEVEL=\"\$LEVEL\" --pair PID=\"\$PID\" --pair MSG=\"\$MSG\")\n");
};

# Kernel Formats
template t_kernel_formatted {
    template("[\$ISODATE] [KERNEL:\$PROGRAM] [\$LEVEL] \$MSG\n");
};

template t_kernel_json {
    template("\$(format-json --scope rfc5424 --pair TIMESTAMP=\"\$ISODATE\" --pair TYPE=\"KERNEL\" --pair FACILITY=\"\$FACILITY\" --pair LEVEL=\"\$LEVEL\" --pair MSG=\"\$MSG\")\n");
};

# -----------------------------------------------------------
# 2. Target Destination Files (Forcing UTC Time-Zone on Write)
# -----------------------------------------------------------
destination d_app_kernel_log { file("/var/log/kernel_syslogng.log"); };
destination d_app_bin_log    { file("/var/log/app_syslogng.log"); };
destination d_combined_log    { file("/var/log/combined.log"); };

# Adding time-zone("UTC") instructs syslog-ng to rewrite $ISODATE to UTC on the fly
destination d_combined_formatted_log { file("/var/log/Combined_formatted.log"  template(t_app_formatted) time-zone("UTC")); };
destination d_combined_json_log      { file("/var/log/Combined_json.log" template(t_app_json) time-zone("UTC")); };

destination d_kernel_formatted_log { file("/var/log/kernel_formatted.log" template(t_kernel_formatted) time-zone("UTC")); };
destination d_kernel_json_log      { file("/var/log/kernel_json.log" template(t_kernel_json) time-zone("UTC")); };

destination d_app_formatted_log { file("/var/log/app_formatted.log" template(t_app_formatted) time-zone("UTC")); };
destination d_app_json_log      { file("/var/log/app_json.log" template(t_app_json) time-zone("UTC")); };

# -----------------------------------------------------------
# 3. Core Engine Paths & Filters
# -----------------------------------------------------------
filter f_app_kernel_only { facility(kern); };
filter f_app_bin_only    { program("app_kernel_syslogng"); };
filter f_combined_stream { filter(f_app_bin_only) or filter(f_app_kernel_only); };




log { source(s_src); filter(f_app_bin_only); filter(f_info_l); destination(d_app_bin_log); };
log { source(s_src); filter(f_app_bin_only); filter(f_info_l); destination(d_app_formatted_log); };
log { source(s_src); filter(f_app_bin_only); filter(f_info_l); destination(d_app_json_log); };

log { source(s_src); filter(f_app_kernel_only); destination(d_app_kernel_log); };
log { source(s_src); filter(f_app_kernel_only);  destination(d_kernel_formatted_log); };
log { source(s_src); filter(f_app_kernel_only); destination(d_kernel_json_log); };

log { source(s_src); filter(f_combined_stream);  destination(d_combined_log); };
log { source(s_src); filter(f_combined_stream);  destination(d_combined_formatted_log); };
log { source(s_src); filter(f_combined_stream); destination(d_combined_json_log); };

